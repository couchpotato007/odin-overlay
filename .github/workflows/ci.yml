name: update-odin-versions

on:
  schedule:
    - cron: 0 20 * * *
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Update versions.nix
        run: ./update.sh

      - name: check diff
        id: diff
        run: |
          if git diff --quiet -- versions.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build odin (stable)
        if: steps.diff.outputs.changed == 'true'
        run: nix build .#odin -L

      - name: Build odin (nightly)
        if: steps.diff.outputs.changed == 'true'
        run: nix build .#odin-nightly -L

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.nix
          git commit -m "chore: update odin versions.nix"
          git push
